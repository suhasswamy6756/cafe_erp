# ===============================
# APPLICATION
# ===============================
spring.application.name=erp
server.port=8000


# ===============================
# DATABASE CONFIGURATION (RDS)
# ===============================
spring.datasource.url=jdbc:postgresql://cafe-erp-db.cfkywggekb28.eu-north-1.rds.amazonaws.com:5432/appdb
spring.datasource.username=postgres
spring.datasource.password=Suhassuppi9060
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (connection pool)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false


# ===============================
# FLYWAY (if you use it)
# ===============================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1


# ===============================
# JWT CONFIG
# ===============================
jwt.secret=VmRyJ0NlbHd5eG9yNTZyV3GtMjN4ZktOYW1rR25ES0pXS0RrTmVNVQ==


# ===============================
# LOGGING (Production Level)
# ===============================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=ERROR
logging.level.com.cafe.erp=INFO

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.server.port=8000